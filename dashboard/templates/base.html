<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Honeypot Dashboard{% endblock %}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>

/* ── Reset & Variables ─────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:         #080b0f;
  --surface:    #0d1117;
  --surface2:   #131920;
  --border:     #1c2533;
  --border2:    #243040;
  --accent:     #00e5ff;
  --accent-dim: #00e5ff33;
  --danger:     #ff3355;
  --warn:       #ffaa00;
  --ok:         #00e5a0;
  --text:       #cdd9e5;
  --dim:        #4a5a6a;
  --mono:       'Share Tech Mono', monospace;
  --sans:       'Barlow Condensed', sans-serif;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  font-size: 16px;
  line-height: 1.5;
}

a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }

/* ── Scanlines ─────────────────────────────────────────────────────── */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 3px,
    rgba(0,0,0,0.06) 3px,
    rgba(0,0,0,0.06) 4px
  );
  pointer-events: none;
  z-index: 9999;
}

/* ── Layout ────────────────────────────────────────────────────────── */
.app {
  display: grid;
  grid-template-rows: auto 1fr;
  min-height: 100vh;
}

/* ── Header ────────────────────────────────────────────────────────── */
header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  display: flex;
  align-items: stretch;
  gap: 0;
  position: sticky;
  top: 0;
  z-index: 100;
}

.header-brand {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 24px 14px 0;
  border-right: 1px solid var(--border);
  margin-right: 8px;
}

.brand-icon {
  width: 28px;
  height: 28px;
  border: 1px solid var(--accent);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--mono);
  font-size: 14px;
  color: var(--accent);
  position: relative;
  flex-shrink: 0;
}

.brand-icon::before {
  content: '';
  position: absolute;
  inset: 3px;
  border: 1px solid var(--accent-dim);
}

.brand-text {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.2em;
  color: var(--accent);
  text-transform: uppercase;
  line-height: 1.3;
}

.brand-text span {
  display: block;
  color: var(--dim);
  font-size: 9px;
  letter-spacing: 0.15em;
}

/* ── Nav ───────────────────────────────────────────────────────────── */
nav {
  display: flex;
  align-items: stretch;
  gap: 0;
  flex: 1;
}

.nav-link {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 0 20px;
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.15em;
  color: var(--dim);
  text-transform: uppercase;
  text-decoration: none;
  border-bottom: 2px solid transparent;
  transition: color 0.2s, border-color 0.2s;
  white-space: nowrap;
}

.nav-link:hover {
  color: var(--text);
  text-decoration: none;
  border-bottom-color: var(--border2);
}

.nav-link.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
}

.nav-link .nav-icon {
  font-size: 13px;
  opacity: 0.7;
}

.header-right {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-left: auto;
  padding-left: 24px;
  border-left: 1px solid var(--border);
}

.status-dot {
  display: flex;
  align-items: center;
  gap: 6px;
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.12em;
  color: var(--ok);
}

.status-dot::before {
  content: '';
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--ok);
  animation: blink 2s ease-in-out infinite;
}

@keyframes blink {
  0%, 100% { opacity: 1; }
  50%       { opacity: 0.2; }
}

/* ── Main content ──────────────────────────────────────────────────── */
main {
  padding: 28px 28px;
  max-width: 1400px;
  width: 100%;
  margin: 0 auto;
}

/* ── Page header ───────────────────────────────────────────────────── */
.page-header {
  display: flex;
  align-items: baseline;
  gap: 16px;
  margin-bottom: 28px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--border);
}

.page-title {
  font-family: var(--mono);
  font-size: 13px;
  letter-spacing: 0.2em;
  color: var(--accent);
  text-transform: uppercase;
}

.page-subtitle {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--dim);
  letter-spacing: 0.1em;
}

/* ── Section label ─────────────────────────────────────────────────── */
.section-label {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.25em;
  color: var(--dim);
  text-transform: uppercase;
  margin-bottom: 10px;
}

/* ── Cards ─────────────────────────────────────────────────────────── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  animation: fadein 0.35s ease both;
}

.card-header {
  padding: 11px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.card-title {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.18em;
  color: var(--accent);
  text-transform: uppercase;
}

.card-body {
  padding: 16px;
}

/* ── Stat cards ────────────────────────────────────────────────────── */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 10px;
  margin-bottom: 24px;
}

@media (max-width: 900px) {
  .stats-grid { grid-template-columns: repeat(3, 1fr); }
}

.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 18px 16px 14px;
  position: relative;
  overflow: hidden;
  animation: fadein 0.35s ease both;
}

.stat-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 2px;
  background: var(--accent);
}

.stat-card.danger::before { background: var(--danger); }
.stat-card.warn::before   { background: var(--warn); }
.stat-card.ok::before     { background: var(--ok); }

.stat-value {
  font-family: var(--mono);
  font-size: 32px;
  line-height: 1;
  color: var(--accent);
  margin-bottom: 6px;
}

.stat-card.danger .stat-value { color: var(--danger); }
.stat-card.warn   .stat-value { color: var(--warn); }
.stat-card.ok     .stat-value { color: var(--ok); }

.stat-label {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.18em;
  color: var(--dim);
  text-transform: uppercase;
}

/* ── Tables ────────────────────────────────────────────────────────── */
.data-table {
  width: 100%;
  border-collapse: collapse;
  font-family: var(--mono);
  font-size: 12px;
}

.data-table th {
  text-align: left;
  padding: 10px 14px;
  font-size: 9px;
  letter-spacing: 0.2em;
  color: var(--dim);
  text-transform: uppercase;
  border-bottom: 1px solid var(--border);
  font-weight: 400;
  white-space: nowrap;
}

.data-table td {
  padding: 9px 14px;
  border-bottom: 1px solid rgba(28,37,51,0.7);
  color: var(--text);
  vertical-align: middle;
}

.data-table tr:last-child td { border-bottom: none; }

.data-table tbody tr {
  transition: background 0.15s;
  cursor: pointer;
}

.data-table tbody tr:hover td {
  background: var(--surface2);
}

/* ── Threat badges ─────────────────────────────────────────────────── */
.badge {
  display: inline-block;
  padding: 2px 8px;
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  border: 1px solid;
  white-space: nowrap;
}

.badge-critical { color: var(--danger); border-color: var(--danger); background: rgba(255,51,85,0.08); }
.badge-high     { color: var(--warn);   border-color: var(--warn);   background: rgba(255,170,0,0.08); }
.badge-medium   { color: var(--accent); border-color: var(--accent); background: var(--accent-dim); }
.badge-low      { color: var(--dim);    border-color: var(--border2); }
.badge-ok       { color: var(--ok);     border-color: var(--ok);     background: rgba(0,229,160,0.08); }
.badge-fail     { color: var(--dim);    border-color: var(--border2); }

/* ── Bar chart rows ────────────────────────────────────────────────── */
.bar-list { display: flex; flex-direction: column; gap: 8px; }

.bar-row {
  display: grid;
  grid-template-columns: 130px 1fr 40px;
  align-items: center;
  gap: 10px;
}

.bar-label {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.bar-track {
  height: 4px;
  background: var(--border);
  position: relative;
}

.bar-fill {
  height: 100%;
  background: var(--accent);
  transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
}

.bar-count {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--dim);
  text-align: right;
}

/* ── Event timeline ────────────────────────────────────────────────── */
.event-list { display: flex; flex-direction: column; gap: 0; }

.event-row {
  display: grid;
  grid-template-columns: 160px 200px 1fr;
  align-items: start;
  gap: 12px;
  padding: 8px 0;
  border-bottom: 1px solid rgba(28,37,51,0.5);
  font-family: var(--mono);
  font-size: 11px;
}

.event-row:last-child { border-bottom: none; }

.event-time   { color: var(--dim); }
.event-type   { color: var(--accent); }
.event-msg    { color: var(--text); word-break: break-all; }

.event-row.cmd .event-type   { color: var(--warn); }
.event-row.auth .event-type  { color: var(--ok); }
.event-row.fail .event-type  { color: var(--danger); }

/* ── Empty state ───────────────────────────────────────────────────── */
.empty {
  padding: 48px 24px;
  text-align: center;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--dim);
  letter-spacing: 0.1em;
}

/* ── Utility ───────────────────────────────────────────────────────── */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
.mb-16  { margin-bottom: 16px; }
.mb-24  { margin-bottom: 24px; }
.mb-8   { margin-bottom: 8px; }
.text-mono { font-family: var(--mono); font-size: 12px; }
.text-dim  { color: var(--dim); }
.text-accent { color: var(--accent); }
.text-danger { color: var(--danger); }

@media (max-width: 700px) {
  .grid-2, .grid-3 { grid-template-columns: 1fr; }
}

/* ── Animations ────────────────────────────────────────────────────── */
@keyframes fadein {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}

.fadein-1 { animation-delay: 0.05s; }
.fadein-2 { animation-delay: 0.10s; }
.fadein-3 { animation-delay: 0.15s; }
.fadein-4 { animation-delay: 0.20s; }
.fadein-5 { animation-delay: 0.25s; }

</style>
{% block extra_head %}{% endblock %}
</head>
<body>
<div class="app">

  <header>
    <div class="header-brand">
      <div class="brand-icon">⬡</div>
      <div class="brand-text">
        COWRIE
        <span>HONEYPOT MONITOR</span>
      </div>
    </div>

    <nav>
      <a href="/"         class="nav-link {% if request.endpoint == 'overview' %}active{% endif %}">
        <span class="nav-icon">◈</span> Overview
      </a>
      <a href="/sessions" class="nav-link {% if request.endpoint == 'sessions' %}active{% endif %}">
        <span class="nav-icon">◫</span> Sessions
      </a>
      <a href="/map"      class="nav-link {% if request.endpoint == 'ip_map' %}active{% endif %}">
        <span class="nav-icon">◎</span> IP Map
      </a>
    </nav>

    <div class="header-right">
      <div class="status-dot">LIVE</div>
    </div>
  </header>

  <main>
    {% if error is defined %}
      <div class="empty">{{ error }}</div>
    {% else %}
      {% block content %}{% endblock %}
    {% endif %}
  </main>

</div>
{% block extra_scripts %}{% endblock %}
</body>
</html>
